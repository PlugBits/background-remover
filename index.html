<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>背景削除ツール</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <p class="eyebrow">Tools</p>
        <h1>背景削除ツール</h1>
      </div>
      <a class="portal-link" href="../" aria-label="Toolsポータルへ戻る">Tools</a>
    </header>

    <section class="workspace" aria-label="背景削除">
      <div class="upload-pane">
        <div id="dropZone" class="drop-zone" tabindex="0" role="button" aria-label="画像を選択">
          <input id="fileInput" type="file" accept="image/png,image/jpeg" hidden>
          <div class="upload-icon" aria-hidden="true">PNG</div>
          <h2>画像をアップロード</h2>
          <p>PNG / JPG / JPEG、最大 5MB</p>
          <button id="selectButton" type="button">ファイルを選択</button>
        </div>

        <div id="adjustPanel" class="adjust-panel" hidden>
          <div class="adjust-title">
            <strong>仕上げ調整</strong>
            <button id="resetAdjustButton" type="button">リセット</button>
          </div>

          <label class="slider-row" for="alphaCutoff">
            <span>薄いフチを消す</span>
            <output id="alphaCutoffValue">0</output>
            <input id="alphaCutoff" type="range" min="0" max="160" value="0">
          </label>

          <label class="slider-row" for="edgeContrast">
            <span>境界をくっきり</span>
            <output id="edgeContrastValue">0</output>
            <input id="edgeContrast" type="range" min="0" max="100" value="0">
          </label>
        </div>

        <div id="message" class="message" role="status" aria-live="polite"></div>
      </div>

      <div class="preview-pane">
        <div class="preview-toolbar">
          <div class="segmented" aria-label="プレビュー背景">
            <button type="button" class="active" data-preview-bg="checker">市松</button>
            <button type="button" data-preview-bg="white">白</button>
            <button type="button" data-preview-bg="black">黒</button>
          </div>
          <button id="downloadButton" class="download" type="button" disabled>PNG保存</button>
        </div>

        <div id="previewStage" class="preview-stage checker">
          <div id="emptyState" class="empty-state">
            <strong>元画像と透過PNGをここで確認</strong>
            <span>画像を選ぶと、処理前の状態をすぐに表示します。</span>
          </div>

          <div id="previewGrid" class="preview-grid" hidden>
            <figure class="preview-card original-card">
              <figcaption>元画像</figcaption>
              <div class="image-box">
                <img id="originalImage" alt="元画像">
              </div>
            </figure>

            <figure class="preview-card result-card">
              <figcaption>
                <span>背景削除後</span>
                <small id="resultBadge">処理待ち</small>
              </figcaption>
              <div class="image-box result-box">
                <div id="processingOverlay" class="processing-overlay" hidden>
                  <span></span>
                  <strong>処理中</strong>
                </div>
                <img id="resultImage" alt="背景削除結果" hidden>
              </div>
            </figure>
          </div>
        </div>
      </div>
    </section>

    <section class="details" aria-label="利用条件">
      <div>
        <span>制限</span>
        <strong>5MB / PNG・JPG・JPEG</strong>
      </div>
      <div>
        <span>回数</span>
        <strong>1分 3回</strong>
      </div>
      <div>
        <span>出力</span>
        <strong>透過PNG</strong>
      </div>
      <div>
        <span>保存</span>
        <strong>アップロード画像は保存しません</strong>
      </div>
    </section>
  </main>

  <script src="./config.js"></script>
  <script src="./app.js"></script>
</body>
</html>
